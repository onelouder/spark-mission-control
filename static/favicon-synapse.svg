<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Synapse favicon - targeting reticle style (amber/yellow) -->
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#glow)" stroke-width="2"/>
  
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="url(#glow)" stroke-width="1.5"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="url(#glow)"/>
  
  <!-- Crosshairs -->
  <line x1="16" y1="2" x2="16" y2="7" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="25" x2="16" y2="30" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="7" y2="16" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="30" y2="16" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
</svg>
