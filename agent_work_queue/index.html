<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Coder IDE</title>
    <style>
      :root {
        /* Backgrounds */
        --bg0: #0b0f14;
        --bg1: #0f1620;
        --bg2: #131c28;
        --bg3: #1a2433;

        /* Borders */
        --border0: rgba(255,255,255,0.06);
        --border1: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.15);

        /* Text */
        --text0: rgba(255,255,255,0.90);
        --text1: rgba(255,255,255,0.65);
        --text2: rgba(255,255,255,0.45);
        --text3: rgba(255,255,255,0.30);

        /* Semantic */
        --accent: #4ea1ff;
        --accent-dim: rgba(78, 161, 255, 0.1);
        --success: #35d07f;
        --warning: #f0b429;
        --danger: #ff5c5c;
        --info: #6ea8ff;
        --purple: #a78bfa;
        
        /* Status - Explicit Mapping from Prompt */
        --status-working: #35d07f;
        --status-inactive: #f0b429;
        --status-waiting: #ff5c5c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg0);
        color: var(--text0);
        height: 100vh;
        overflow: hidden;
        font-size: 11px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg0);
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2e3b4e;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }

      /* Animations */
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(53, 208, 127, 0.4); }
        70% { box-shadow: 0 0 0 4px rgba(53, 208, 127, 0); }
        100% { box-shadow: 0 0 0 0 rgba(53, 208, 127, 0); }
      }
      
      .status-pulse {
        animation: pulse 2s infinite;
      }
    </style>

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

  </body>
</html>
