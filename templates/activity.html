<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Mission Control — Activity Log</title>
    <link rel="stylesheet" href="/static/ide-noir.css">
    <link rel="stylesheet" href="/static/mission-control.css">
    <style>
        /* Activity Timeline Layout */
        .activity-layout {
            display: flex;
            height: calc(100vh - 52px);
        }
        
        /* Sidebar Filters */
        .activity-sidebar {
            width: 220px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .filter-section h4 {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .filter-chip {
            padding: 4px 10px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: #ccc;
        }
        
        .filter-chip:hover {
            border-color: #4a9eff;
            color: #fff;
        }
        
        .filter-chip.active {
            background: #1e3a5f;
            border-color: #4a9eff;
            color: #fff;
        }
        
        .search-input {
            width: 100%;
            padding: 8px 10px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
        }
        
        .search-input:focus {
            border-color: #4a9eff;
            outline: none;
        }
        
        /* Stats Panel */
        .stats-panel {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid #333;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        
        .stat-row .value {
            color: #fff;
            font-family: monospace;
        }
        
        /* Timeline Main */
        .activity-main {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }
        
        /* Timeline Entry */
        .timeline-entry {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: border-color 0.15s ease;
        }
        
        .timeline-entry:hover {
            border-color: #4a9eff;
        }
        
        .entry-time {
            font-size: 11px;
            color: #666;
            font-family: monospace;
            min-width: 80px;
        }
        
        .entry-action {
            font-size: 10px;
            padding: 2px 6px;
            background: #333;
            border-radius: 4px;
            color: #aaa;
            min-width: 80px;
            text-align: center;
        }
        
        .entry-action.file {
            background: #1e3a5f;
            color: #4a9eff;
        }
        
        .entry-action.exec {
            background: #3a1e5f;
            color: #9e4aff;
        }
        
        .entry-action.web {
            background: #1e5f3a;
            color: #4aff9e;
        }
        
        .entry-action.communication {
            background: #5f3a1e;
            color: #ff9e4a;
        }
        
        .entry-action.task {
            background: #5f5f1e;
            color: #ffff4a;
        }
        
        .entry-action.system {
            background: #5f1e1e;
            color: #ff4a4a;
        }
        
        .entry-content {
            flex: 1;
        }
        
        .entry-summary {
            color: #e0e0e0;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .entry-target {
            font-size: 11px;
            color: #666;
            font-family: monospace;
        }
        
        .entry-agent {
            font-size: 11px;
            color: #888;
            padding: 2px 6px;
            background: #252525;
            border-radius: 4px;
        }
        
        /* Day Separator */
        .day-separator {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0 16px 0;
        }
        
        .day-separator .date {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
        }
        
        .day-separator .line {
            flex: 1;
            height: 1px;
            background: #333;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state h3 {
            color: #888;
            margin-bottom: 8px;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        
        .pagination button {
            padding: 8px 16px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 4px;
            color: #ccc;
            cursor: pointer;
        }
        
        .pagination button:hover {
            border-color: #4a9eff;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="nav-brand">Mission Control</div>
        <div class="nav-links">
            <a href="/briefing">Briefing</a>
            <a href="/email">Email</a>
            <a href="/">Kanban</a>
            <a href="/queue">Queue</a>
            <a href="/synapse">Synapse</a>
            <a href="https://jarvis.jwells.net/activity" target="_blank">Jarvis</a>
            <a href="/activity" class="active">Activity</a>
            <a href="/rbot">Research</a>
        </div>
    </nav>

    <div class="activity-layout">
        <!-- Sidebar Filters -->
        <aside class="activity-sidebar">
            <div class="filter-section">
                <h4>Search</h4>
                <input type="text" class="search-input" id="search-input" placeholder="Search activity...">
            </div>
            
            <div class="filter-section">
                <h4>Time Range</h4>
                <div class="filter-chips" id="days-filter">
                    <div class="filter-chip" data-days="1">Today</div>
                    <div class="filter-chip active" data-days="7">7 Days</div>
                    <div class="filter-chip" data-days="30">30 Days</div>
                </div>
            </div>
            
            <div class="filter-section">
                <h4>Agents</h4>
                <div class="filter-chips" id="agent-filter">
                    <div class="filter-chip active" data-agent="">All</div>
                </div>
            </div>
            
            <div class="filter-section">
                <h4>Categories</h4>
                <div class="filter-chips" id="category-filter">
                    <div class="filter-chip active" data-category="">All</div>
                    <div class="filter-chip" data-category="file">File</div>
                    <div class="filter-chip" data-category="exec">Exec</div>
                    <div class="filter-chip" data-category="web">Web</div>
                    <div class="filter-chip" data-category="communication">Comms</div>
                    <div class="filter-chip" data-category="task">Task</div>
                    <div class="filter-chip" data-category="system">System</div>
                </div>
            </div>
            
            <!-- Stats -->
            <div class="stats-panel" id="stats-panel">
                <div class="stat-row">
                    <span>Total entries</span>
                    <span class="value" id="stat-total">-</span>
                </div>
                <div class="stat-row">
                    <span>Agents active</span>
                    <span class="value" id="stat-agents">-</span>
                </div>
            </div>
        </aside>
        
        <!-- Timeline -->
        <main class="activity-main" id="activity-timeline">
            <div class="loading">Loading activity...</div>
        </main>
    </div>

    <script>
        // State
        let currentFilters = {
            days: 7,
            agent: null,
            category: null,
            search: null,
            offset: 0,
            limit: 50
        };
        
        let stats = {};
        let activityWebSocket = null;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 5;
        let realtimeEnabled = true;
        let currentEntries = []; // Cache for real-time updates
        
        // Action category mapping for styling
        const actionCategories = {
            file_read: 'file', file_write: 'file', file_edit: 'file',
            exec: 'exec',
            web_search: 'web', web_fetch: 'web',
            message_send: 'communication', spawn: 'communication',
            task_create: 'task', task_update: 'task',
            cron_add: 'system', session_start: 'system', session_end: 'system',
            decision: 'system', error: 'system'
        };
        
        function getActionCategory(action) {
            return actionCategories[action] || 'system';
        }
        
        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
        
        function formatDate(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        
        // WebSocket functions
        function connectActivityWebSocket() {
            if (!realtimeEnabled || activityWebSocket) return;
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/activity/ws`;
            
            try {
                activityWebSocket = new WebSocket(wsUrl);
                
                activityWebSocket.onopen = function(event) {
                    console.log('[Activity WS] Connected');
                    reconnectAttempts = 0;
                    updateConnectionStatus(true);
                };
                
                activityWebSocket.onmessage = function(event) {
                    try {
                        const message = JSON.parse(event.data);
                        handleActivityWebSocketMessage(message);
                    } catch (error) {
                        console.error('[Activity WS] Error parsing message:', error);
                    }
                };
                
                activityWebSocket.onclose = function(event) {
                    console.log('[Activity WS] Disconnected');
                    activityWebSocket = null;
                    updateConnectionStatus(false);
                    
                    // Attempt reconnection
                    if (realtimeEnabled && reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
                        setTimeout(connectActivityWebSocket, delay);
                    }
                };
                
                activityWebSocket.onerror = function(error) {
                    console.error('[Activity WS] Error:', error);
                };
                
            } catch (error) {
                console.error('[Activity WS] Failed to connect:', error);
            }
        }
        
        function handleActivityWebSocketMessage(message) {
            switch (message.type) {
                case 'activity_added':
                    if (message.entry && shouldShowEntry(message.entry)) {
                        addNewActivityEntry(message.entry);
                    }
                    break;
                case 'activity_history':
                    if (message.entries) {
                        console.log('[Activity WS] Received history:', message.entries.length, 'entries');
                        // Don't replace timeline if user is viewing filtered data
                        if (isDefaultFilter()) {
                            currentEntries = message.entries;
                            renderTimeline(currentEntries);
                        }
                    }
                    break;
                case 'activity_stats_updated':
                    if (message.stats) {
                        updateStats(message.stats);
                    }
                    break;
                case 'ping':
                    // Keep-alive ping
                    break;
                default:
                    console.log('[Activity WS] Unknown message type:', message.type);
            }
        }
        
        function shouldShowEntry(entry) {
            // Check if entry matches current filters
            if (currentFilters.agent && entry.agent !== currentFilters.agent) return false;
            if (currentFilters.category) {
                const entryCategory = getActionCategory(entry.action);
                if (entryCategory !== currentFilters.category) return false;
            }
            if (currentFilters.search) {
                const searchLower = currentFilters.search.toLowerCase();
                const searchable = `${entry.summary} ${entry.target || ''}`.toLowerCase();
                if (!searchable.includes(searchLower)) return false;
            }
            return true;
        }
        
        function addNewActivityEntry(entry) {
            // Add to current entries cache
            currentEntries.unshift(entry);
            
            // Limit cache size
            if (currentEntries.length > 200) {
                currentEntries = currentEntries.slice(0, 200);
            }
            
            // Re-render if on first page
            if (currentFilters.offset === 0) {
                renderTimeline(currentEntries.slice(0, currentFilters.limit));
                
                // Flash new entry
                setTimeout(() => {
                    const firstEntry = document.querySelector('.timeline-entry');
                    if (firstEntry) {
                        firstEntry.style.background = '#1e3a5f';
                        setTimeout(() => {
                            firstEntry.style.background = '#1a1a1a';
                        }, 1000);
                    }
                }, 100);
            }
        }
        
        function isDefaultFilter() {
            return currentFilters.days === 7 && !currentFilters.agent && 
                   !currentFilters.category && !currentFilters.search && currentFilters.offset === 0;
        }
        
        function updateConnectionStatus(connected) {
            // Add status indicator if needed
            let indicator = document.querySelector('.activity-connection-status');
            if (!indicator) {
                indicator = document.createElement('div');
                indicator.className = 'activity-connection-status';
                indicator.style.cssText = `
                    position: absolute;
                    top: 8px;
                    right: 8px;
                    width: 8px;
                    height: 8px;
                    border-radius: 50%;
                    z-index: 1000;
                `;
                document.querySelector('.activity-main').appendChild(indicator);
            }
            
            indicator.style.backgroundColor = connected ? '#4aff9e' : '#ff4a4a';
            indicator.title = connected ? 'Real-time updates connected' : 'Real-time updates disconnected';
        }
        
        function updateStats(stats) {
            if (stats.total !== undefined) {
                document.getElementById('stat-total').textContent = stats.total;
            }
            if (stats.by_agent) {
                document.getElementById('stat-agents').textContent = Object.keys(stats.by_agent).length;
            }
        }

        function renderTimeline(entries) {
            const container = document.getElementById('activity-timeline');
            
            if (!entries || entries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Activity Found</h3>
                        <p>Try adjusting your filters or time range.</p>
                    </div>
                `;
                return;
            }
            
            // Group by day
            const byDay = {};
            entries.forEach(entry => {
                const day = entry.ts ? entry.ts.substring(0, 10) : 'unknown';
                if (!byDay[day]) byDay[day] = [];
                byDay[day].push(entry);
            });
            
            let html = '';
            Object.keys(byDay).sort().reverse().forEach(day => {
                html += `
                    <div class="day-separator">
                        <span class="date">${formatDate(day + 'T00:00:00Z')}</span>
                        <span class="line"></span>
                    </div>
                `;
                
                byDay[day].forEach(entry => {
                    const cat = getActionCategory(entry.action);
                    html += `
                        <div class="timeline-entry">
                            <span class="entry-time">${formatTime(entry.ts)}</span>
                            <span class="entry-action ${cat}">${entry.action}</span>
                            <div class="entry-content">
                                <div class="entry-summary">${escapeHtml(entry.summary)}</div>
                                ${entry.target ? `<div class="entry-target">${escapeHtml(entry.target)}</div>` : ''}
                            </div>
                            <span class="entry-agent">${entry.agent}</span>
                        </div>
                    `;
                });
            });
            
            // Pagination
            const hasMore = entries.length >= currentFilters.limit;
            const hasPrev = currentFilters.offset > 0;
            
            if (hasMore || hasPrev) {
                html += `
                    <div class="pagination">
                        <button onclick="prevPage()" ${!hasPrev ? 'disabled' : ''}>Previous</button>
                        <button onclick="nextPage()" ${!hasMore ? 'disabled' : ''}>Next</button>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
        
        async function loadActivity() {
            const container = document.getElementById('activity-timeline');
            container.innerHTML = '<div class="loading">Loading activity...</div>';
            
            try {
                const params = new URLSearchParams();
                params.set('days', currentFilters.days);
                params.set('limit', currentFilters.limit);
                params.set('offset', currentFilters.offset);
                if (currentFilters.agent) params.set('agent', currentFilters.agent);
                if (currentFilters.category) params.set('category', currentFilters.category);
                if (currentFilters.search) params.set('search', currentFilters.search);
                
                const response = await fetch(`/api/activity?${params}`);
                const data = await response.json();
                
                // Update cache for real-time updates (only if on first page with default filters)
                if (currentFilters.offset === 0 && !currentFilters.search && !currentFilters.agent && !currentFilters.category) {
                    currentEntries = data.entries || [];
                }
                
                renderTimeline(data.entries);
                
                // Update stats
                document.getElementById('stat-total').textContent = data.total;
                
            } catch (error) {
                container.innerHTML = `<div class="empty-state"><h3>Error loading activity</h3><p>${error.message}</p></div>`;
            }
        }
        
        async function loadAgents() {
            try {
                const response = await fetch('/api/activity/agents');
                const data = await response.json();
                
                const container = document.getElementById('agent-filter');
                let html = '<div class="filter-chip active" data-agent="">All</div>';
                
                data.agents.forEach(agent => {
                    html += `<div class="filter-chip" data-agent="${agent}">${agent}</div>`;
                });
                
                container.innerHTML = html;
                document.getElementById('stat-agents').textContent = data.agents.length;
                
                // Rebind click handlers
                bindFilterClicks();
                
            } catch (error) {
                console.error('Failed to load agents:', error);
            }
        }
        
        function bindFilterClicks() {
            // Days filter
            document.querySelectorAll('#days-filter .filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('#days-filter .filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilters.days = parseInt(chip.dataset.days);
                    currentFilters.offset = 0;
                    loadActivity();
                });
            });
            
            // Agent filter
            document.querySelectorAll('#agent-filter .filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('#agent-filter .filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilters.agent = chip.dataset.agent || null;
                    currentFilters.offset = 0;
                    loadActivity();
                });
            });
            
            // Category filter
            document.querySelectorAll('#category-filter .filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('#category-filter .filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilters.category = chip.dataset.category || null;
                    currentFilters.offset = 0;
                    loadActivity();
                });
            });
        }
        
        function nextPage() {
            currentFilters.offset += currentFilters.limit;
            loadActivity();
        }
        
        function prevPage() {
            currentFilters.offset = Math.max(0, currentFilters.offset - currentFilters.limit);
            loadActivity();
        }
        
        // Search with debounce
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentFilters.search = e.target.value || null;
                currentFilters.offset = 0;
                loadActivity();
            }, 300);
        });
        
        // Initialize
        bindFilterClicks();
        loadAgents();
        loadActivity();
        
        // Start WebSocket connection for real-time updates
        connectActivityWebSocket();
    </script>
</body>
</html>
